[runtime]
log_level = "INFO"
enable_collector = true
enable_audio_capturer = false
enable_screen_capturer = false
enable_processor = false

[capturer.audio]
spool_dir = "tmp/audio"
request_timeout_s = 30.0
max_upload_per_cycle = 5
min_rms = 0
reconnect_delay_s = 5.0
sample_rate = 8000
target_sample_rate = 8000
frame_ms = 20
vad_mode = 2
start_rms = 150
continue_rms = 100
start_trigger_ms = 120
start_window_ms = 400
end_silence_ms = 700
pre_roll_ms = 300
min_segment_ms = 500
max_segment_ms = 30000
input_device = ""
latency = ""
gain_db = 0.0
diagnostic_s = 0.0
low_speech_ratio = 0.2
low_speech_max_ms = 1600

[capturer.screen]
tmp_dir = "tmp/screen"
fps = 0.5
request_timeout_s = 30.0
prompt_permission = false
dedup_window_s = 300.0
dedup_threshold = 5

[collector]
host = "127.0.0.1"
port = 8000
audio_url = "http://127.0.0.1:8000/api/audio"
screen_url = "http://127.0.0.1:8000/api/screen"
tmp_dir = "tmp/collector"
vault_dir = "vault"

[services.audio]
url = "https://generativelanguage.googleapis.com/v1beta/openai/chat/completions"
method = "POST"
timeout = 60
format = "gemini"
headers = { Authorization = "Bearer ${GEMINI_API_KEY}" } # paste here your api key
body = { 
  model = "gemini-2.0-flash",
  messages = [
    { 
      role = "user",
      content = [
        { type = "text", text = "Transcribe the attached audio." },
        { type = "input_audio", input_audio = { data = "{{file.base64}}", format = "{{file.audio_format}}" } }
      ]
    }
  ]
}

[services.screen]
url = "https://generativelanguage.googleapis.com/v1beta/openai/chat/completions"
method = "POST"
timeout = 60
format = "gemini"
headers = { Authorization = "Bearer ${GEMINI_API_KEY}" } # paste here your api key
body = {
  model = "gemini-2.0-flash",
  messages = [
    {
      role = "user",
      content = [
        { type = "text", text = "Describe or transcribe everything visible in the attached image." },
        { type = "image_url", image_url = { url = "{{file.data_url}}" } }
      ]
    }
  ]
}

[services.processor]
url = "https://generativelanguage.googleapis.com/v1beta/openai/chat/completions"
method = "POST"
timeout = 60
format = "gemini"
headers = { Authorization = "Bearer ${GEMINI_API_KEY}" } # paste here your api key
body = { model = "gemini-2.0-flash" }


[processor]
vault_dir = "vault"
out_dir = "out"
state_dir = "state"
poll_interval_seconds = 10.0
execution_mode = "per_stage_worker"
max_concurrent_tasks = 1

[processor.prompts]
l1_event = """You transform raw capturer records into normalized event objects.

Return valid JSON only.

Input:
- `events`: array of raw capturer records

Output:
- Return exactly one normalized object per input item under `events`

For each output object, include:
- `event_id`
- `timestamp`
- `title`
- `description`
- `content`
- `meta`
- optionally `source_type`, `app_name`, `context`

Requirements:
- Preserve the original event ordering.
- Keep `timestamp` aligned with the source event unless correction is clearly justified by the input.
- `title` must be short and specific.
- `description` must be one concise summary sentence.
- `content` should contain the most useful cleaned textual content from the raw event.
- `meta` should remain a structured object.
- Do not invent facts that are not supported by the input.
- If the input is noisy or sparse, still return the best faithful normalized event.

Return shape:
{
  "events": [
    {
      "event_id": "string",
      "timestamp": "ISO-8601 string",
      "title": "string",
      "description": "string",
      "content": "string",
      "meta": {},
      "source_type": "string",
      "app_name": "string",
      "context": {}
    }
  ]
}"""
l2_timeline = """You transform normalized events into a cleaned timeline and grouped super-events.

Return valid JSON only.

Input:
- `events`: array of normalized event objects

Output:
- `cleaned_timeline`: ordered timeline items
- `super_events`: grouped higher-level units spanning one or more events

Each timeline item should include:
- `timeline_event_id`
- `title`
- `description`
- `timestamp_start`
- `timestamp_end`
- `source_event_ids`
- optionally `super_event_id`

Each super event should include:
- `super_event_id`
- `title`
- `description`
- `timestamp_start`
- `timestamp_end`
- `source_event_ids`
- `timeline_event_ids`
- optionally `grouping_dimensions`, `category`, `subject`

Requirements:
- Keep the timeline chronologically ordered.
- Group events when they clearly belong to the same coherent activity, task, or session.
- Use precise, compact titles.
- `source_event_ids` must reference real input event ids.
- Avoid over-grouping unrelated events.
- If grouping is weak, prefer smaller and more faithful groups.
- Do not invent unsupported categories or subjects.

Return shape:
{
  "cleaned_timeline": [
    {
      "timeline_event_id": "string",
      "title": "string",
      "description": "string",
      "timestamp_start": "ISO-8601 string",
      "timestamp_end": "ISO-8601 string",
      "source_event_ids": ["event_id"],
      "super_event_id": "string"
    }
  ],
  "super_events": [
    {
      "super_event_id": "string",
      "title": "string",
      "description": "string",
      "timestamp_start": "ISO-8601 string",
      "timestamp_end": "ISO-8601 string",
      "source_event_ids": ["event_id"],
      "timeline_event_ids": ["timeline_event_id"],
      "grouping_dimensions": ["topic"],
      "category": "string",
      "subject": "string"
    }
  ]
}"""
l3_notes = """You transform super-events into inbox notes.

Return valid JSON only.

Input:
- `super_events`: array of grouped activity objects

Output:
- `notes`: exactly one note per input super-event

Each note should include:
- `note_id`
- `timestamp`
- `date`
- `title`
- `description`
- `content`
- `category`
- `subject`
- `super_event_id`
- `source_event_ids`

Requirements:
- Produce one note for each input super-event.
- `title` should read like a useful personal note title.
- `description` should be a short summary.
- `content` should be a fuller, still concise note body based only on the input.
- Preserve traceability fields exactly.
- Do not invent facts, plans, or conclusions unsupported by the source material.
- If the input is sparse, still emit a faithful minimal note.

Return shape:
{
  "notes": [
    {
      "note_id": "string",
      "timestamp": "ISO-8601 string",
      "date": "YYYY-MM-DD",
      "title": "string",
      "description": "string",
      "content": "string",
      "category": "string",
      "subject": "string",
      "super_event_id": "string",
      "source_event_ids": ["event_id"]
    }
  ]
}"""

[processor.collections.vault]
base_dir = "vault"
path = "."

[processor.collections.l1]
path = "l1"

[processor.collections.l0_processed_raw]
path = "l0_processed_raw"

[processor.collections.l2]
path = "l2"

[processor.collections.l1_processed]
path = "l1_processed"

[processor.collections.timeline_events]
path = "timeline_events"

[processor.collections.timeline]
path = "timeline"

[processor.collections.notes]
path = "notes"

[processor.collections.note_docs]
path = "notes/inbox"
format = "markdown"

[[processor.stages]]
name = "l1"
enabled = true
type = "llm_map"
input_collection = "vault"
prompt_key = "l1_event"
batch_size = 5
flush_threshold = 5
archive_collection = "l0_processed_raw"
transform_adapter = "legacy_l1"
outputs = [{ name = "events", collection = "l1" }]

[[processor.stages]]
name = "l2"
enabled = true
type = "llm_reduce"
input_collection = "l1"
prompt_key = "l2_timeline"
batch_size = 5
flush_threshold = 5
archive_collection = "l1_processed"
upstream_collections = ["vault"]
transform_adapter = "legacy_l2"
outputs = [
  { name = "timeline_events", collection = "timeline_events", projection = "jsonl_day" },
  { name = "super_events", collection = "l2" },
]

[[processor.stages]]
name = "l3"
enabled = true
type = "llm_reduce"
input_collection = "l2"
prompt_key = "l3_notes"
batch_size = 15
flush_threshold = 15
upstream_collections = ["l1"]
transform_adapter = "legacy_l3"
outputs = [
  { name = "notes", collection = "notes" },
  { name = "note_docs", collection = "note_docs", projection = "markdown_note" },
]
