# Model size to load with faster-whisper.
# Examples: "tiny", "base", "small", "medium", "large-v2", "large-v3"
model_size: medium

# Directory where faster-whisper models are stored.
model_path: ./models

# Device to use for computation. "cpu" or "cuda".
device: cpu

# Type of computation. Examples: "int8", "float16".
compute_type: int8

# Beam size for the transcription.
beam_size: 5

# Language for transcription. Set to "auto" for automatic detection.
# You can also specify a language code, e.g., "en", "es", "fr".
language: auto

# Host and port for the FastAPI server.
host: 127.0.0.1
port: 9000
reload: true
log_level: info
